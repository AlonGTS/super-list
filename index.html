<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MarketTogether</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #e2ddd4;
    --text: #1a1917;
    --muted: #7a756d;
    --accent: #2d6a4f;
    --accent-light: #d8f3dc;
    --accent-muted: #95c9a6;
    --danger: #c1121f;
    --danger-light: #ffe5e7;
    --amber: #b5660a;
    --amber-light: #fff3cd;
    --purple: #5c4aaa;
    --purple-light: #ede9fb;
    --coral: #c44b2b;
    --coral-light: #fce8e3;
    --blue: #1d5da4;
    --blue-light: #dbeafe;
    --teal: #0f7062;
    --teal-light: #d0f0eb;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }
  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .app-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--accent); }
  .users { display: flex; gap: 4px; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; border: 2px solid white;
    margin-left: -6px;
  }
  .avatar:first-child { margin-left: 0; }
  .av-you { background: var(--accent); color: white; }
  .av-spouse { background: var(--purple); color: white; }
  .online-dot {
    width: 8px; height: 8px; background: #22c55e; border-radius: 50%;
    display: inline-block; margin-right: 6px;
  }
  .sync-label { font-size: 12px; color: var(--muted); display: flex; align-items: center; }
  /* TABS */
  .tabs { display: flex; gap: 4px; }
  .tab {
    flex: 1; padding: 8px 4px; border: none; background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--muted); cursor: pointer; border-radius: var(--radius-sm);
    transition: all 0.15s;
  }
  .tab.active { background: var(--accent-light); color: var(--accent); }
  /* CONTENT */
  .content { padding: 16px; }
  .view { display: none; }
  .view.active { display: block; }
  /* ADD ITEM */
  .add-bar {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 12px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .add-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .add-input {
    flex: 1; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--bg); color: var(--text); outline: none;
    transition: border 0.15s;
  }
  .add-input:focus { border-color: var(--accent-muted); }
  .add-btn {
    background: var(--accent); color: white; border: none;
    border-radius: var(--radius-sm); padding: 9px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; white-space: nowrap; transition: opacity 0.15s;
  }
  .add-btn:hover { opacity: 0.85; }
  .add-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-select {
    flex: 1; min-width: 100px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 7px 10px; font-family: 'DM Sans', sans-serif; font-size: 13px;
    background: var(--bg); color: var(--text); outline: none; cursor: pointer;
  }
  .qty-row { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface2); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; color: var(--text); line-height: 1;
  }
  .qty-val { font-size: 14px; font-weight: 500; min-width: 20px; text-align: center; }
  /* CATEGORY SECTIONS */
  .cat-section { margin-bottom: 16px; }
  .cat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-radius: var(--radius-sm);
    cursor: pointer; margin-bottom: 6px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .cat-count {
    background: rgba(255,255,255,0.5); border-radius: 20px;
    padding: 2px 8px; font-size: 11px; font-weight: 600;
  }
  .cat-items { display: flex; flex-direction: column; gap: 6px; }
  /* ITEM */
  .item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
    transition: all 0.2s;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: translateY(0); } }
  .item.done {
    opacity: 0.5;
    background: var(--surface2);
  }
  .item.done .item-name { text-decoration: line-through; color: var(--muted); }
  .check-btn {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--border); background: transparent;
    cursor: pointer; flex-shrink: 0; position: relative;
    transition: all 0.15s;
  }
  .check-btn.checked { background: var(--accent); border-color: var(--accent); }
  .check-btn.checked::after {
    content: ''; position: absolute; top: 4px; left: 7px;
    width: 5px; height: 9px; border: 2px solid white;
    border-top: none; border-left: none; transform: rotate(45deg);
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta { font-size: 12px; color: var(--muted); margin-top: 2px; display: flex; gap: 8px; }
  .item-qty { font-size: 13px; color: var(--muted); font-weight: 500; }
  .who-badge {
    font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
  }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 16px; padding: 4px; line-height: 1;
    opacity: 0; transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .item:hover .del-btn { opacity: 1; }
  /* CATEGORY COLORS */
  .cat-vegetables { background: #d0f0eb; color: var(--teal); }
  .cat-fruits { background: #fce8e3; color: var(--coral); }
  .cat-dairy { background: #dbeafe; color: var(--blue); }
  .cat-bakery { background: #fff3cd; color: var(--amber); }
  .cat-meat { background: #ffe5e7; color: var(--danger); }
  .cat-accessories { background: var(--purple-light); color: var(--purple); }
  .cat-other { background: var(--surface2); color: var(--muted); }
  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }
  /* STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
  }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .stat-val { font-size: 24px; font-weight: 600; }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .section-title {
    font-size: 13px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin: 20px 0 10px;
  }
  /* BAR CHART */
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 13px; width: 90px; flex-shrink: 0; color: var(--text); }
  .bar-track { flex: 1; height: 10px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 5px; transition: width 0.6s ease; }
  .bar-num { font-size: 12px; color: var(--muted); width: 28px; text-align: right; flex-shrink: 0; }
  /* ACTIVITY */
  .activity-list { display: flex; flex-direction: column; gap: 8px; }
  .activity-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px;
  }
  .activity-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; flex-shrink: 0;
  }
  .activity-text { flex: 1; color: var(--text); }
  .activity-time { color: var(--muted); font-size: 11px; flex-shrink: 0; }
  /* PROGRESS RING */
  .progress-wrap { display: flex; align-items: center; gap: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .ring-label { font-size: 14px; font-weight: 500; }
  .ring-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  /* FILTER BAR */
  .filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-pill {
    border: 1px solid var(--border); background: var(--surface);
    border-radius: 20px; padding: 5px 12px; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap;
    color: var(--muted); transition: all 0.15s;
  }
  .filter-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
  /* TOAST */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--text); color: white; padding: 10px 18px;
    border-radius: 30px; font-size: 13px; font-weight: 500;
    transition: transform 0.3s ease; z-index: 999; white-space: nowrap;
    box-shadow: var(--shadow-md);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  /* CHECKED SECTION */
  .checked-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 20px 0 10px; cursor: pointer;
  }
  .checked-title { font-size: 13px; color: var(--muted); font-weight: 500; }
  .clear-btn {
    font-size: 12px; color: var(--danger); background: none; border: none;
    cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">MarketTogether</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="sync-label"><span class="online-dot"></span>Synced</div>
      <div class="users">
        <div class="avatar av-you">Y</div>
        <div class="avatar av-spouse">S</div>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('list')">Shopping List</button>
    <button class="tab" onclick="switchTab('stats')">Statistics</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>
</div>

<div class="content">

  <!-- LIST VIEW -->
  <div id="view-list" class="view active">
    <div class="add-bar">
      <div class="add-row">
        <input class="add-input" id="item-input" placeholder="Add an item..." onkeydown="if(event.key==='Enter')addItem()">
        <button class="add-btn" onclick="addItem()">+ Add</button>
      </div>
      <div class="add-meta">
        <select class="meta-select" id="cat-select">
          <option value="vegetables">🥦 Vegetables</option>
          <option value="fruits">🍎 Fruits</option>
          <option value="dairy">🥛 Dairy</option>
          <option value="bakery">🍞 Bakery</option>
          <option value="meat">🥩 Meat</option>
          <option value="accessories">🧴 Accessories</option>
          <option value="other">📦 Other</option>
        </select>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-val" id="qty-display">1</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
        <select class="meta-select" id="who-select" style="flex:0.7">
          <option value="you">You</option>
          <option value="spouse">Spouse</option>
          <option value="both">Both</option>
        </select>
      </div>
    </div>

    <div class="filter-row">
      <button class="filter-pill active" onclick="setFilter('all',this)">All</button>
      <button class="filter-pill" onclick="setFilter('vegetables',this)">🥦 Veg</button>
      <button class="filter-pill" onclick="setFilter('fruits',this)">🍎 Fruits</button>
      <button class="filter-pill" onclick="setFilter('dairy',this)">🥛 Dairy</button>
      <button class="filter-pill" onclick="setFilter('bakery',this)">🍞 Bakery</button>
      <button class="filter-pill" onclick="setFilter('meat',this)">🥩 Meat</button>
      <button class="filter-pill" onclick="setFilter('accessories',this)">🧴 Access.</button>
      <button class="filter-pill" onclick="setFilter('other',this)">📦 Other</button>
    </div>

    <div id="list-container"></div>
    <div id="checked-section" style="display:none">
      <div class="checked-header" onclick="toggleChecked()">
        <span class="checked-title" id="checked-title">Done (0)</span>
        <button class="clear-btn" onclick="event.stopPropagation();clearDone()">Clear all</button>
      </div>
      <div id="checked-container"></div>
    </div>
  </div>

  <!-- STATS VIEW -->
  <div id="view-stats" class="view">
    <div class="progress-wrap">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="26" fill="none" stroke="#e2ddd4" stroke-width="6"/>
        <circle id="progress-ring" cx="32" cy="32" r="26" fill="none" stroke="#2d6a4f" stroke-width="6"
          stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="163.4"
          transform="rotate(-90 32 32)" style="transition:stroke-dashoffset 0.6s ease"/>
        <text x="32" y="37" text-anchor="middle" font-family="DM Sans" font-size="14" font-weight="600" fill="#1a1917" id="ring-pct">0%</text>
      </svg>
      <div>
        <div class="ring-label">Shopping progress</div>
        <div class="ring-sub" id="ring-sub">Loading...</div>
      </div>
    </div>

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-label">Total items</div><div class="stat-val" id="s-total">0</div></div>
      <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-val" id="s-done">0</div></div>
      <div class="stat-card"><div class="stat-label">Your items</div><div class="stat-val" id="s-you">0</div></div>
      <div class="stat-card"><div class="stat-label">Spouse items</div><div class="stat-val" id="s-spouse">0</div></div>
    </div>

    <div class="section-title">Items by category</div>
    <div class="bar-chart" id="cat-bars"></div>

    <div class="section-title" style="margin-top:20px">This week's totals</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Lists completed</div><div class="stat-val">3</div><div class="stat-sub">↑ vs last week</div></div>
      <div class="stat-card"><div class="stat-label">Avg items/trip</div><div class="stat-val">14</div><div class="stat-sub">Est. 40 min</div></div>
    </div>

    <div class="section-title">Most added items</div>
    <div id="frequent-items" class="activity-list"></div>
  </div>

  <!-- HISTORY VIEW -->
  <div id="view-history" class="view">
    <div class="section-title" style="margin-top:0">Recent activity</div>
    <div class="activity-list" id="activity-list"></div>

    <div class="section-title">Past lists</div>
    <div id="past-lists"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const CATS = {
  vegetables: { label: '🥦 Vegetables', color: '#0f7062', bg: '#d0f0eb' },
  fruits:     { label: '🍎 Fruits',     color: '#c44b2b', bg: '#fce8e3' },
  dairy:      { label: '🥛 Dairy',      color: '#1d5da4', bg: '#dbeafe' },
  bakery:     { label: '🍞 Bakery',     color: '#b5660a', bg: '#fff3cd' },
  meat:       { label: '🥩 Meat',       color: '#c1121f', bg: '#ffe5e7' },
  accessories:{ label: '🧴 Accessories',color: '#5c4aaa', bg: '#ede9fb' },
  other:      { label: '📦 Other',      color: '#7a756d', bg: '#f0ede6' },
};

let qty = 1;
let activeFilter = 'all';
let checkedExpanded = true;

let items = [
  { id:1, name:'Tomatoes', cat:'vegetables', qty:4, who:'spouse', done:false, ts: Date.now()-3600000 },
  { id:2, name:'Cucumbers', cat:'vegetables', qty:2, who:'you', done:false, ts: Date.now()-3400000 },
  { id:3, name:'Apples', cat:'fruits', qty:6, who:'both', done:true, ts: Date.now()-3200000 },
  { id:4, name:'Bananas', cat:'fruits', qty:1, who:'you', done:false, ts: Date.now()-3000000 },
  { id:5, name:'Milk', cat:'dairy', qty:2, who:'spouse', done:false, ts: Date.now()-2800000 },
  { id:6, name:'Yogurt', cat:'dairy', qty:3, who:'you', done:true, ts: Date.now()-2600000 },
  { id:7, name:'Whole Grain Bread', cat:'bakery', qty:1, who:'both', done:false, ts: Date.now()-2400000 },
  { id:8, name:'Chicken breast', cat:'meat', qty:2, who:'spouse', done:false, ts: Date.now()-2200000 },
  { id:9, name:'Shampoo', cat:'accessories', qty:1, who:'you', done:false, ts: Date.now()-2000000 },
  { id:10, name:'Dish soap', cat:'accessories', qty:1, who:'both', done:true, ts: Date.now()-1800000 },
];

let nextId = 11;
let activity = [
  { who:'spouse', text:'Added Tomatoes', time:'2 min ago' },
  { who:'you', text:'Checked off Yogurt', time:'15 min ago' },
  { who:'both', text:'List created for Friday trip', time:'1 hr ago' },
  { who:'spouse', text:'Added Chicken breast', time:'2 hr ago' },
  { who:'you', text:'Removed duplicates', time:'Yesterday' },
];

function changeQty(d) {
  qty = Math.max(1, Math.min(20, qty + d));
  document.getElementById('qty-display').textContent = qty;
}

function addItem() {
  const input = document.getElementById('item-input');
  const name = input.value.trim();
  if (!name) return;
  const cat = document.getElementById('cat-select').value;
  const who = document.getElementById('who-select').value;
  const item = { id: nextId++, name, cat, qty, who, done: false, ts: Date.now() };
  items.unshift(item);
  activity.unshift({ who, text: `Added ${name}`, time: 'Just now' });
  input.value = '';
  qty = 1;
  document.getElementById('qty-display').textContent = 1;
  renderList();
  renderStats();
  renderHistory();
  showToast(`"${name}" added`);
}

function toggleItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.done = !item.done;
  if (item.done) {
    activity.unshift({ who: item.who, text: `Checked off ${item.name}`, time: 'Just now' });
  }
  renderList();
  renderStats();
  renderHistory();
}

function deleteItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  items = items.filter(i => i.id !== id);
  activity.unshift({ who: item.who, text: `Removed ${item.name}`, time: 'Just now' });
  renderList();
  renderStats();
  renderHistory();
  showToast(`"${item.name}" removed`);
}

function clearDone() {
  items = items.filter(i => !i.done);
  renderList();
  renderStats();
  showToast('Completed items cleared');
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function toggleChecked() {
  checkedExpanded = !checkedExpanded;
  document.getElementById('checked-container').style.display = checkedExpanded ? 'flex' : 'none';
  if (checkedExpanded) document.getElementById('checked-container').style.flexDirection = 'column';
}

function renderList() {
  const pending = items.filter(i => !i.done && (activeFilter === 'all' || i.cat === activeFilter));
  const done = items.filter(i => i.done && (activeFilter === 'all' || i.cat === activeFilter));
  const container = document.getElementById('list-container');
  const checkedSection = document.getElementById('checked-section');
  const checkedContainer = document.getElementById('checked-container');

  // group pending by category
  const groups = {};
  const catOrder = ['vegetables','fruits','dairy','bakery','meat','accessories','other'];
  catOrder.forEach(c => { groups[c] = []; });
  pending.forEach(i => { if (groups[i.cat]) groups[i.cat].push(i); });

  let html = '';
  catOrder.forEach(cat => {
    const catItems = groups[cat];
    if (!catItems.length) return;
    const c = CATS[cat];
    html += `<div class="cat-section">
      <div class="cat-header" style="background:${c.bg};color:${c.color}">
        <span>${c.label}</span>
        <span class="cat-count">${catItems.length}</span>
      </div>
      <div class="cat-items">`;
    catItems.forEach(item => { html += renderItem(item); });
    html += `</div></div>`;
  });

  if (!html) {
    html = `<div class="empty"><div class="empty-icon">🛒</div><p>${activeFilter==='all'?'Your list is empty — add your first item!':'No items in this category.'}</p></div>`;
  }
  container.innerHTML = html;

  if (done.length) {
    checkedSection.style.display = 'block';
    document.getElementById('checked-title').textContent = `Done (${done.length})`;
    checkedContainer.innerHTML = `<div style="display:flex;flex-direction:column;gap:6px">${done.map(i => renderItem(i)).join('')}</div>`;
  } else {
    checkedSection.style.display = 'none';
  }
}

function renderItem(item) {
  const whoColor = item.who === 'you' ? '#2d6a4f' : item.who === 'spouse' ? '#5c4aaa' : '#b5660a';
  const whoBg = item.who === 'you' ? '#d8f3dc' : item.who === 'spouse' ? '#ede9fb' : '#fff3cd';
  const whoLabel = item.who === 'you' ? 'You' : item.who === 'spouse' ? 'Spouse' : 'Both';
  return `<div class="item${item.done?' done':''}">
    <button class="check-btn${item.done?' checked':''}" onclick="toggleItem(${item.id})"></button>
    <div class="item-info">
      <div class="item-name">${item.name}</div>
      <div class="item-meta">
        <span class="who-badge" style="background:${whoBg};color:${whoColor}">${whoLabel}</span>
        ${item.qty > 1 ? `<span>×${item.qty}</span>` : ''}
      </div>
    </div>
    <button class="del-btn" onclick="deleteItem(${item.id})">✕</button>
  </div>`;
}

function renderStats() {
  const total = items.length;
  const done = items.filter(i => i.done).length;
  const youItems = items.filter(i => i.who === 'you' || i.who === 'both').length;
  const spouseItems = items.filter(i => i.who === 'spouse' || i.who === 'both').length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const circ = 2 * Math.PI * 26;
  const offset = circ - (pct / 100) * circ;

  document.getElementById('progress-ring').style.strokeDashoffset = offset;
  document.getElementById('ring-pct').textContent = pct + '%';
  document.getElementById('ring-sub').textContent = `${done} of ${total} items collected`;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-you').textContent = youItems;
  document.getElementById('s-spouse').textContent = spouseItems;

  // cat bars
  const catCounts = {};
  Object.keys(CATS).forEach(c => catCounts[c] = 0);
  items.forEach(i => catCounts[i.cat]++);
  const maxCount = Math.max(...Object.values(catCounts), 1);
  const colors = { vegetables:'#0f7062',fruits:'#c44b2b',dairy:'#1d5da4',bakery:'#b5660a',meat:'#c1121f',accessories:'#5c4aaa',other:'#7a756d' };
  document.getElementById('cat-bars').innerHTML = Object.entries(catCounts)
    .filter(([,v]) => v > 0)
    .sort((a,b) => b[1]-a[1])
    .map(([cat, cnt]) => `
      <div class="bar-row">
        <div class="bar-label">${CATS[cat].label.split(' ').slice(1).join(' ')}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/maxCount*100)}%;background:${colors[cat]}"></div></div>
        <div class="bar-num">${cnt}</div>
      </div>`).join('');

  // frequent
  const freq = { Tomatoes:7, Milk:6, Bread:5, Apples:5, Yogurt:4, Chicken:3 };
  document.getElementById('frequent-items').innerHTML = Object.entries(freq).map(([name, n]) =>
    `<div class="activity-item"><span style="font-size:13px;flex:1">${name}</span><span style="color:var(--muted);font-size:12px">Added ${n}× this month</span></div>`
  ).join('');
}

function renderHistory() {
  document.getElementById('activity-list').innerHTML = activity.slice(0,8).map(a => {
    const bg = a.who === 'you' ? '#d8f3dc' : a.who === 'spouse' ? '#ede9fb' : '#fff3cd';
    const color = a.who === 'you' ? '#2d6a4f' : a.who === 'spouse' ? '#5c4aaa' : '#b5660a';
    const letter = a.who === 'you' ? 'Y' : a.who === 'spouse' ? 'S' : '✦';
    return `<div class="activity-item">
      <div class="activity-avatar" style="background:${bg};color:${color}">${letter}</div>
      <div class="activity-text">${a.text}</div>
      <div class="activity-time">${a.time}</div>
    </div>`;
  }).join('');

  const pastLists = [
    { date: 'Tuesday, Mar 25', items: 12, done: 12 },
    { date: 'Saturday, Mar 22', items: 18, done: 16 },
    { date: 'Wednesday, Mar 19', items: 9, done: 9 },
  ];
  document.getElementById('past-lists').innerHTML = pastLists.map(l =>
    `<div class="activity-item" style="margin-bottom:8px;border-radius:var(--radius)">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500">${l.date}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${l.done}/${l.items} items collected</div>
      </div>
      <div style="font-size:12px;background:${l.done===l.items?'#d8f3dc':'#fff3cd'};color:${l.done===l.items?'#2d6a4f':'#b5660a'};padding:4px 10px;border-radius:20px;font-weight:500">
        ${l.done===l.items?'Complete':'Partial'}
      </div>
    </div>`
  ).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'stats') renderStats();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

renderList();
renderStats();
renderHistory();
</script>
</body>
</html>
