<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MarketTogether</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0; --surface: #ffffff; --surface2: #f0ede6; --border: #e2ddd4;
    --text: #1a1917; --muted: #7a756d; --accent: #2d6a4f; --accent-light: #d8f3dc;
    --accent-muted: #95c9a6; --danger: #c1121f; --amber: #b5660a; --amber-light: #fff3cd;
    --purple: #5c4aaa; --purple-light: #ede9fb; --radius: 14px; --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07); --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }

  .setup-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; padding: 32px 24px; text-align: center; }
  .setup-title { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--accent); margin-bottom: 8px; }
  .setup-sub { font-size: 15px; color: var(--muted); margin-bottom: 36px; line-height: 1.6; }
  .setup-cards { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
  .setup-card { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); padding: 18px 20px; cursor: pointer; transition: all 0.2s; text-align: left; display: flex; align-items: center; gap: 14px; }
  .setup-card:hover { border-color: var(--accent-muted); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .setup-card.selected { border-color: var(--accent); background: var(--accent-light); }
  .setup-avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; flex-shrink: 0; }
  .setup-card-name { font-size: 16px; font-weight: 600; }
  .setup-card-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .setup-name-input { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; background: var(--bg); color: var(--text); outline: none; margin-top: 8px; transition: border 0.15s; }
  .setup-name-input:focus { border-color: var(--accent-muted); }
  .setup-confirm { width: 100%; max-width: 320px; margin-top: 16px; background: var(--accent); color: white; border: none; border-radius: var(--radius); padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; opacity: 0.35; pointer-events: none; }
  .setup-confirm.ready { opacity: 1; pointer-events: all; }

  .loading-screen { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9998; gap: 16px; }
  .loading-title { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--accent); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .app-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--accent); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; border: 2px solid white; margin-left: -6px; }
  .avatar:first-child { margin-left: 0; }
  .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .sync-label { font-size: 12px; color: var(--muted); display: flex; align-items: center; }
  .tabs { display: flex; gap: 4px; }
  .tab { flex: 1; padding: 8px 4px; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-radius: var(--radius-sm); transition: all 0.15s; }
  .tab.active { background: var(--accent-light); color: var(--accent); }

  .content { padding: 16px; }
  .view { display: none; }
  .view.active { display: block; }

  .add-bar { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .add-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .add-input { flex: 1; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--bg); color: var(--text); outline: none; transition: border 0.15s; }
  .add-input:focus { border-color: var(--accent-muted); }
  .add-btn { background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); padding: 9px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .add-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-select { flex: 1; min-width: 100px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: var(--bg); color: var(--text); outline: none; cursor: pointer; }
  .qty-row { display: flex; align-items: center; gap: 8px; }
  .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 500; }
  .qty-val { font-size: 14px; font-weight: 500; min-width: 20px; text-align: center; }
  .who-selector { display: flex; gap: 6px; margin-top: 8px; }
  .who-opt { flex: 1; padding: 7px 4px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; background: var(--bg); color: var(--muted); transition: all 0.15s; font-family: 'DM Sans', sans-serif; }

  .filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-pill { border: 1px solid var(--border); background: var(--surface); border-radius: 20px; padding: 5px 12px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; color: var(--muted); transition: all 0.15s; }
  .filter-pill.active { background: var(--accent); color: white; border-color: var(--accent); }

  .cat-section { margin-bottom: 16px; }
  .cat-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 13px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; }
  .cat-count { background: rgba(255,255,255,0.5); border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .cat-items { display: flex; flex-direction: column; gap: 6px; }

  .item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; gap: 10px; transition: all 0.2s; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .item.done { opacity: 0.5; background: var(--surface2); }
  .item.done .item-name { text-decoration: line-through; color: var(--muted); }
  .check-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; flex-shrink: 0; position: relative; transition: all 0.15s; }
  .check-btn.checked { background: var(--accent); border-color: var(--accent); }
  .check-btn.checked::after { content: ''; position: absolute; top: 4px; left: 7px; width: 5px; height: 9px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg); }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta { font-size: 12px; color: var(--muted); margin-top: 2px; display: flex; gap: 8px; align-items: center; }
  .who-badge { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 20px; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 4px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
  .item:hover .del-btn { opacity: 1; }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  .checked-header { display: flex; align-items: center; justify-content: space-between; margin: 20px 0 10px; }
  .checked-title { font-size: 13px; color: var(--muted); font-weight: 500; }
  .clear-btn { font-size: 12px; color: var(--danger); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .stat-val { font-size: 24px; font-weight: 600; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 20px 0 10px; }

  .progress-wrap { display: flex; align-items: center; gap: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .ring-label { font-size: 14px; font-weight: 500; }
  .ring-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 13px; width: 90px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 10px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 5px; transition: width 0.6s ease; }
  .bar-num { font-size: 12px; color: var(--muted); width: 28px; text-align: right; flex-shrink: 0; }

  .activity-list { display: flex; flex-direction: column; gap: 8px; }
  .activity-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .activity-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
  .activity-time { color: var(--muted); font-size: 11px; flex-shrink: 0; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: white; padding: 10px 18px; border-radius: 30px; font-size: 13px; font-weight: 500; transition: transform 0.3s ease; z-index: 9999; white-space: nowrap; box-shadow: var(--shadow-md); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .switch-btn { font-size: 12px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 20px; padding: 4px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
</style>
</head>
<body>

<div class="setup-screen" id="setup-screen">
  <div class="setup-title">MarketTogether</div>
  <div class="setup-sub">Welcome! Who are you<br>on this device?</div>
  <div class="setup-cards">
    <div class="setup-card" id="card-person1" onclick="selectPerson('person1')">
      <div class="setup-avatar" style="background:#d8f3dc;color:#2d6a4f" id="av-p1">?</div>
      <div>
        <div class="setup-card-name" id="name-p1">Person 1</div>
        <div class="setup-card-desc" id="desc-p1">First time? Enter your name</div>
      </div>
    </div>
    <div class="setup-card" id="card-person2" onclick="selectPerson('person2')">
      <div class="setup-avatar" style="background:#ede9fb;color:#5c4aaa" id="av-p2">?</div>
      <div>
        <div class="setup-card-name" id="name-p2">Person 2</div>
        <div class="setup-card-desc" id="desc-p2">First time? Enter your name</div>
      </div>
    </div>
  </div>
  <div id="name-wrap" style="width:100%;max-width:320px;display:none">
    <input class="setup-name-input" id="name-input" placeholder="Your name..." oninput="checkReady()" onkeydown="if(event.key==='Enter')confirmSetup()">
  </div>
  <button class="setup-confirm" id="setup-confirm" onclick="confirmSetup()">Let's shop! 🛒</button>
</div>

<div class="loading-screen" id="loading-screen">
  <div class="loading-title">MarketTogether</div>
  <div class="spinner"></div>
</div>

<div id="main-app" style="display:none">
  <div class="header">
    <div class="header-top">
      <div class="app-title">MarketTogether</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="sync-label"><span class="online-dot"></span>Live</div>
        <div style="display:flex" id="header-avatars"></div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('list',this)">Shopping List</button>
      <button class="tab" onclick="switchTab('stats',this)">Statistics</button>
      <button class="tab" onclick="switchTab('history',this)">History</button>
    </div>
  </div>

  <div class="content">
    <div id="view-list" class="view active">
      <div class="add-bar">
        <div class="add-row">
          <input class="add-input" id="item-input" placeholder="Add an item..." onkeydown="if(event.key==='Enter')addItem()">
          <button class="add-btn" onclick="addItem()">+ Add</button>
        </div>
        <div class="add-meta">
          <select class="meta-select" id="cat-select">
            <option value="vegetables">🥦 Vegetables</option>
            <option value="fruits">🍎 Fruits</option>
            <option value="dairy">🥛 Dairy</option>
            <option value="bakery">🍞 Bakery</option>
            <option value="meat">🥩 Meat</option>
            <option value="pharm">💊 Pharm</option>
            <option value="accessories">🧴 Accessories</option>
            <option value="other">📦 Other</option>
          </select>
          <div class="qty-row">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <span class="qty-val" id="qty-display">1</span>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
        </div>
        <div class="who-selector" id="who-selector"></div>
      </div>
      <div class="filter-row">
        <button class="filter-pill active" onclick="setFilter('all',this)">All</button>
        <button class="filter-pill" onclick="setFilter('vegetables',this)">🥦 Veg</button>
        <button class="filter-pill" onclick="setFilter('fruits',this)">🍎 Fruits</button>
        <button class="filter-pill" onclick="setFilter('dairy',this)">🥛 Dairy</button>
        <button class="filter-pill" onclick="setFilter('bakery',this)">🍞 Bakery</button>
        <button class="filter-pill" onclick="setFilter('meat',this)">🥩 Meat</button>
        <button class="filter-pill" onclick="setFilter('accessories',this)">🧴 Access.</button>
        <button class="filter-pill" onclick="setFilter('pharm',this)">💊 פארם</button>
        <button class="filter-pill" onclick="setFilter('other',this)">📦 Other</button>
      </div>
      <div id="list-container"></div>
      <div id="checked-section" style="display:none">
        <div class="checked-header">
          <span class="checked-title" id="checked-title">Done (0)</span>
          <button class="clear-btn" onclick="clearDone()">Clear all</button>
        </div>
        <div id="checked-container"></div>
      </div>
    </div>

    <div id="view-stats" class="view">
      <div class="progress-wrap">
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="26" fill="none" stroke="#e2ddd4" stroke-width="6"/>
          <circle id="progress-ring" cx="32" cy="32" r="26" fill="none" stroke="#2d6a4f" stroke-width="6" stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="163.4" transform="rotate(-90 32 32)" style="transition:stroke-dashoffset 0.6s ease"/>
          <text x="32" y="37" text-anchor="middle" font-family="DM Sans" font-size="14" font-weight="600" fill="#1a1917" id="ring-pct">0%</text>
        </svg>
        <div>
          <div class="ring-label">Shopping progress</div>
          <div class="ring-sub" id="ring-sub">Loading...</div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total items</div><div class="stat-val" id="s-total">0</div></div>
        <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-val" id="s-done">0</div></div>
        <div class="stat-card"><div class="stat-label" id="s-p1-label">Person 1</div><div class="stat-val" id="s-p1">0</div></div>
        <div class="stat-card"><div class="stat-label" id="s-p2-label">Person 2</div><div class="stat-val" id="s-p2">0</div></div>
      </div>
      <div class="section-title">Items by category</div>
      <div class="bar-chart" id="cat-bars"></div>
    </div>

    <div id="view-history" class="view">
      <div class="section-title" style="margin-top:0">Recent activity</div>
      <div class="activity-list" id="activity-list"></div>
      <div style="margin-top:24px;text-align:center">
        <button class="switch-btn" onclick="signOut()">Switch user</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, setDoc, getDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgikNn60xspZmPf_Lp4SzXQwvsjhV50OM",
  authDomain: "super-list-ad2f7.firebaseapp.com",
  projectId: "super-list-ad2f7",
  storageBucket: "super-list-ad2f7.firebasestorage.app",
  messagingSenderId: "337078022846",
  appId: "1:337078022846:web:397438abf56b9939ff64ef"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const CATS = {
  vegetables:{label:'🥦 Vegetables',color:'#0f7062',bg:'#d0f0eb'},
  fruits:{label:'🍎 Fruits',color:'#c44b2b',bg:'#fce8e3'},
  dairy:{label:'🥛 Dairy',color:'#1d5da4',bg:'#dbeafe'},
  bakery:{label:'🍞 Bakery',color:'#b5660a',bg:'#fff3cd'},
  meat:{label:'🥩 Meat',color:'#c1121f',bg:'#ffe5e7'},
  accessories:{label:'🧴 Accessories',color:'#5c4aaa',bg:'#ede9fb'},
  pharm: { label: '💊 פארם', color: '#5c4aaa', bg: '#ede9fb' },
  other:{label:'📦 Other',color:'#7a756d',bg:'#f0ede6'},
};
const COLORS = {
  person1:{bg:'#d8f3dc',color:'#2d6a4f'},
  person2:{bg:'#ede9fb',color:'#5c4aaa'},
  both:{bg:'#fff3cd',color:'#b5660a'}
};

let items=[], activity=[], names={person1:'',person2:''};
let qty=1, selectedWho='me', activeFilter='all';
let myRole=null, myName='', selectedRole=null;

// ---- SETUP ----
async function loadNames() {
  try {
    const snap = await getDoc(doc(db,'config','names'));
    if (snap.exists()) { names = snap.data(); refreshSetupUI(); }
  } catch(e) {}
}

function refreshSetupUI() {
  ['person1','person2'].forEach((role,i) => {
    const n = names[role];
    const num = i+1;
    document.getElementById('av-p'+num).textContent = n ? n[0].toUpperCase() : '?';
    document.getElementById('name-p'+num).textContent = n || 'Person '+num;
    document.getElementById('desc-p'+num).textContent = n ? 'Tap to sign in' : 'First time? Enter your name';
  });
}

window.selectPerson = function(role) {
  selectedRole = role;
  document.querySelectorAll('.setup-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('card-'+role).classList.add('selected');
  const wrap = document.getElementById('name-wrap');
  const input = document.getElementById('name-input');
  if (!names[role]) { wrap.style.display='block'; input.value=''; input.focus(); }
  else { wrap.style.display='none'; input.value=names[role]; }
  checkReady();
};

window.checkReady = function() {
  const ready = selectedRole && (names[selectedRole] || document.getElementById('name-input').value.trim().length>0);
  document.getElementById('setup-confirm').classList.toggle('ready', !!ready);
};

window.confirmSetup = async function() {
  if (!selectedRole) return;
  const inputVal = document.getElementById('name-input').value.trim();
  const finalName = names[selectedRole] || inputVal;
  if (!finalName) return;
  if (!names[selectedRole] && inputVal) {
    names[selectedRole] = inputVal;
    await setDoc(doc(db,'config','names'), names);
  }
  myRole = selectedRole; myName = finalName;
  localStorage.setItem('mt_role', myRole);
  localStorage.setItem('mt_name', myName);
  document.getElementById('setup-screen').style.display = 'none';
  startApp();
};

window.signOut = function() {
  localStorage.removeItem('mt_role'); localStorage.removeItem('mt_name'); location.reload();
};

// ---- APP ----
function getPartner() { return myRole==='person1'?'person2':'person1'; }
function getName(role) { return role==='both'?'Both':(names[role]||(role==='person1'?'Person 1':'Person 2')); }
function getInitial(role) { const n=getName(role); return n[0].toUpperCase(); }

function startApp() {
  document.getElementById('loading-screen').style.display = 'flex';
  buildWhoSelector(); updateAvatars();

  onSnapshot(query(collection(db,'items'),orderBy('createdAt','desc')), snap => {
    items = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderList(); renderStats();
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
  });

  onSnapshot(query(collection(db,'activity'),orderBy('ts','desc')), snap => {
    activity = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderHistory();
  });

  onSnapshot(doc(db,'config','names'), snap => {
    if (snap.exists()) { names=snap.data(); buildWhoSelector(); updateAvatars(); renderList(); renderStats(); renderHistory(); }
  });
}

function buildWhoSelector() {
  const partner = getPartner();
  const meC = COLORS[myRole], pC = COLORS[partner], bC = COLORS.both;
  document.getElementById('who-selector').innerHTML = `
    <button class="who-opt" id="who-me" onclick="selectWho('me')" style="background:${meC.bg};color:${meC.color};border-color:${meC.color}50">${getName(myRole)}</button>
    <button class="who-opt" id="who-partner" onclick="selectWho('partner')">${getName(partner)}</button>
    <button class="who-opt" id="who-both" onclick="selectWho('both')">Both</button>
  `;
  selectedWho='me';
}

function updateAvatars() {
  document.getElementById('header-avatars').innerHTML =
    ['person1','person2'].map(r=>`<div class="avatar" style="background:${COLORS[r].bg};color:${COLORS[r].color}" title="${getName(r)}">${getInitial(r)}</div>`).join('');
  const sl1=document.getElementById('s-p1-label'), sl2=document.getElementById('s-p2-label');
  if(sl1) sl1.textContent=getName('person1')+"'s items";
  if(sl2) sl2.textContent=getName('person2')+"'s items";
}

window.selectWho = function(who) {
  selectedWho = who;
  const partner = getPartner();
  const meEl=document.getElementById('who-me'), pEl=document.getElementById('who-partner'), bEl=document.getElementById('who-both');
  const meC=COLORS[myRole], pC=COLORS[partner], bC=COLORS.both;
  meEl.style.cssText = who==='me' ? `background:${meC.bg};color:${meC.color};border-color:${meC.color}50` : '';
  pEl.style.cssText  = who==='partner' ? `background:${pC.bg};color:${pC.color};border-color:${pC.color}50` : '';
  bEl.style.cssText  = who==='both' ? `background:${bC.bg};color:${bC.color};border-color:${bC.color}50` : '';
};

function resolveWho(who) {
  if(who==='me') return myRole;
  if(who==='partner') return getPartner();
  return 'both';
}

window.changeQty = d => { qty=Math.max(1,Math.min(20,qty+d)); document.getElementById('qty-display').textContent=qty; };

window.addItem = async function() {
  const input=document.getElementById('item-input'), name=input.value.trim();
  if(!name) return;
  const cat=document.getElementById('cat-select').value, who=resolveWho(selectedWho), q=qty;
  input.value=''; qty=1; document.getElementById('qty-display').textContent=1;
  await addDoc(collection(db,'items'),{name,cat,qty:q,who,done:false,createdAt:serverTimestamp()});
  await addDoc(collection(db,'activity'),{role:myRole,name:myName,text:`added ${name}`,ts:serverTimestamp()});
  showToast(`"${name}" added`);
};

window.toggleItem = async function(id) {
  const item=items.find(i=>i.id===id); if(!item) return;
  await updateDoc(doc(db,'items',id),{done:!item.done});
  if(!item.done) await addDoc(collection(db,'activity'),{role:myRole,name:myName,text:`checked off ${item.name}`,ts:serverTimestamp()});
};

window.deleteItem = async function(id) {
  const item=items.find(i=>i.id===id); if(!item) return;
  await deleteDoc(doc(db,'items',id));
  await addDoc(collection(db,'activity'),{role:myRole,name:myName,text:`removed ${item.name}`,ts:serverTimestamp()});
  showToast(`"${item.name}" removed`);
};

window.clearDone = async function() {
  await Promise.all(items.filter(i=>i.done).map(i=>deleteDoc(doc(db,'items',i.id))));
  showToast('Completed items cleared');
};

window.setFilter = function(f,el) {
  activeFilter=f;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); renderList();
};

function getBadge(who) {
  const role = (who==='both')?'both':who;
  const c = COLORS[role]||COLORS.both;
  return {bg:c.bg, color:c.color, label:getName(role)};
}

function renderList() {
  const pending=items.filter(i=>!i.done&&(activeFilter==='all'||i.cat===activeFilter));
  const done=items.filter(i=>i.done&&(activeFilter==='all'||i.cat===activeFilter));
  const catOrder = ['vegetables','fruits','dairy','bakery','meat','accessories','pharm','other'];
  const groups={}; catOrder.forEach(c=>groups[c]=[]);
  pending.forEach(i=>{if(groups[i.cat])groups[i.cat].push(i);});
  let html='';
  catOrder.forEach(cat=>{
    const ci=groups[cat]; if(!ci.length) return;
    const c=CATS[cat];
    html+=`<div class="cat-section"><div class="cat-header" style="background:${c.bg};color:${c.color}"><span>${c.label}</span><span class="cat-count">${ci.length}</span></div><div class="cat-items">${ci.map(renderItem).join('')}</div></div>`;
  });
  if(!html) html=`<div class="empty"><div class="empty-icon">🛒</div><p>${activeFilter==='all'?'Your list is empty!':'No items in this category.'}</p></div>`;
  document.getElementById('list-container').innerHTML=html;
  const cs=document.getElementById('checked-section');
  if(done.length){
    cs.style.display='block';
    document.getElementById('checked-title').textContent=`Done (${done.length})`;
    document.getElementById('checked-container').innerHTML=`<div style="display:flex;flex-direction:column;gap:6px">${done.map(renderItem).join('')}</div>`;
  } else { cs.style.display='none'; }
}

function renderItem(item) {
  const b=getBadge(item.who);
  return `<div class="item${item.done?' done':''}">
    <button class="check-btn${item.done?' checked':''}" onclick="toggleItem('${item.id}')"></button>
    <div class="item-info">
      <div class="item-name">${item.name}</div>
      <div class="item-meta">
        <span class="who-badge" style="background:${b.bg};color:${b.color}">${b.label}</span>
        ${item.qty>1?`<span>×${item.qty}</span>`:''}
      </div>
    </div>
    <button class="del-btn" onclick="deleteItem('${item.id}')">✕</button>
  </div>`;
}

function renderStats() {
  const total=items.length, done=items.filter(i=>i.done).length;
  const p1=items.filter(i=>i.who==='person1'||i.who==='both').length;
  const p2=items.filter(i=>i.who==='person2'||i.who==='both').length;
  const pct=total?Math.round(done/total*100):0;
  const circ=2*Math.PI*26;
  document.getElementById('progress-ring').style.strokeDashoffset=circ-(pct/100)*circ;
  document.getElementById('ring-pct').textContent=pct+'%';
  document.getElementById('ring-sub').textContent=`${done} of ${total} items collected`;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-p1').textContent=p1;
  document.getElementById('s-p2').textContent=p2;
  updateAvatars();
  const cc={}; Object.keys(CATS).forEach(c=>cc[c]=0); items.forEach(i=>cc[i.cat]++);
  const max=Math.max(...Object.values(cc),1);
  const cols={vegetables:'#0f7062',fruits:'#c44b2b',dairy:'#1d5da4',bakery:'#b5660a',meat:'#c1121f',accessories:'#5c4aaa',other:'#7a756d'};
  document.getElementById('cat-bars').innerHTML=Object.entries(cc).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([cat,cnt])=>`
    <div class="bar-row"><div class="bar-label">${CATS[cat].label.split(' ').slice(1).join(' ')}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/max*100)}%;background:${cols[cat]}"></div></div>
    <div class="bar-num">${cnt}</div></div>`).join('')||'<div style="color:var(--muted);font-size:13px">No items yet</div>';
}

function timeAgo(ts) {
  if(!ts) return 'just now';
  const s=Math.floor((Date.now()-ts.toMillis())/1000);
  if(s<60) return 'just now'; if(s<3600) return Math.floor(s/60)+' min ago';
  if(s<86400) return Math.floor(s/3600)+' hr ago'; return Math.floor(s/86400)+'d ago';
}

function renderHistory() {
  const list=document.getElementById('activity-list');
  if(!activity.length){list.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">No activity yet</div>';return;}
  list.innerHTML=activity.slice(0,20).map(a=>{
    const role=a.role||'person1', c=COLORS[role]||COLORS.person1;
    const displayName=a.name||getName(role);
    return `<div class="activity-item">
      <div class="activity-avatar" style="background:${c.bg};color:${c.color}">${displayName[0].toUpperCase()}</div>
      <div style="flex:1"><strong>${displayName}</strong> ${a.text}</div>
      <div class="activity-time">${timeAgo(a.ts)}</div>
    </div>`;
  }).join('');
}

window.switchTab = function(tab,el) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active'); el.classList.add('active');
};

let toastTimer;
window.showToast = function(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
};

// INIT
async function init() {
  await loadNames();
  const savedRole=localStorage.getItem('mt_role'), savedName=localStorage.getItem('mt_name');
  if(savedRole&&savedName){ myRole=savedRole; myName=savedName; document.getElementById('setup-screen').style.display='none'; startApp(); }
}
init();
</script>
</body>
</html>
